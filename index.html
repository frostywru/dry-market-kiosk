<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>M&L Dry Market</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div id="kiosk">

  <header class="kiosk-header">
    <div class="header-left">
      <span class="store-emoji">🧅</span>
      <div>
        <h1 class="store-name">M&L Dry Market</h1>
        <p class="store-sub">Sariwa · Mura · Araw-araw</p>
      </div>
    </div>

    <button class="admin-btn" onclick="toggleAdmin()">⚙ Admin</button>
  </header>

  <div class="kiosk-body">

    <div class="menu-panel">
      <div class="section-label">📦 Available Items</div>

      <div id="products" class="product-grid">
        <div class="loading-spinner">Loading products…</div>
      </div>
    </div>

    <div class="cart-panel">
      <div class="section-label">🛒 Your Basket</div>

      <div id="cartItems" class="cart-items">
        <div class="empty-cart">
          <span>🥬</span>
          <p>Add items to your basket</p>
        </div>
      </div>

      <div class="cart-footer">
        <div class="cart-total-row">
          <span>TOTAL</span>
          <span id="total">₱0.00</span>
        </div>

        <input type="text" id="customerName" placeholder="Name (optional)" />

        <button class="order-btn" onclick="checkout()" id="order-btn">
          Place Order
        </button>

        <button class="clear-btn" onclick="clearCart()">Clear Basket</button>
      </div>
    </div>

  </div>
</div>

<!-- RECEIPT -->
<div id="receiptModal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <h2 class="modal-title">🧾 Receipt</h2>
    <div id="receipt"></div>
    <button class="confirm-btn" onclick="closeReceipt()">Close</button>
  </div>
</div>

<!-- ADMIN LOGIN -->
<div id="admin-login-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">
    <h2 class="modal-title">Admin Login</h2>
    <input type="password" id="admin-password-input" placeholder="Enter password" />
    <p id="login-error" style="color:red;display:none;">Wrong password</p>
    <button onclick="checkAdminLogin()">Login</button>
    <button onclick="closeAdminLogin()">Cancel</button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-view" style="display:none">

  <header class="kiosk-header">
    <div class="header-left">
      <span class="store-emoji">⚙️</span>
      <div>
        <h1 class="store-name">Admin Panel</h1>
        <p class="store-sub">Inventory & Orders</p>
      </div>
    </div>

    <button class="admin-btn" onclick="toggleAdmin()">← Back</button>
  </header>

  <div class="kiosk-body">

    <div class="menu-panel">
      <div class="section-label">📦 Inventory</div>
      <div id="adminProducts"></div>
    </div>

    <div class="cart-panel">
      <div class="section-label">📋 Orders</div>
      <div id="orders"></div>
    </div>

  </div>
</div>

<script type="module" src="app.js"></script>

</body>
</html>
