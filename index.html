<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>M&L Dry Market</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- ═════════ KIOSK VIEW ═════════ -->
<div id="kiosk-view">

  <header class="kiosk-header">
    <div class="header-left">
      <span class="store-emoji">🧅</span>
      <div>
        <h1 class="store-name">M&L Dry Market</h1>
        <p class="store-sub">Sariwa · Mura · Araw-araw</p>
      </div>
    </div>

    <button class="admin-btn" onclick="openAdminLogin()">⚙ Admin</button>
  </header>

  <div class="kiosk-body">

    <!-- PRODUCTS -->
    <div class="menu-panel">
      <div class="section-label">📦 Available Items</div>
      <div id="product-grid" class="product-grid">
        <div class="loading-spinner">Loading products…</div>
      </div>
    </div>

    <!-- CART -->
    <div class="cart-panel">
      <div class="section-label">🛒 Your Basket</div>

      <div id="cart-items" class="cart-items">
        <div class="empty-cart">
          <span>🥬</span>
          <p>Add items to your basket</p>
        </div>
      </div>

      <div class="cart-footer">
        <div class="cart-total-row">
          <span>TOTAL</span>
          <span id="cart-total">₱0.00</span>
        </div>

        <button class="order-btn" id="order-btn" onclick="openOrderModal()" disabled>
          Place Order
        </button>

        <button class="clear-btn" onclick="clearCart()">Clear Basket</button>
      </div>
    </div>

  </div>
</div>

<!-- ═════════ ORDER MODAL ═════════ -->
<div id="order-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">

    <h2 class="modal-title">🧾 Order Summary</h2>

    <div id="receipt-items" class="receipt-items"></div>

    <div class="receipt-total-row">
      <span>TOTAL DUE</span>
      <span id="receipt-total">₱0.00</span>
    </div>

    <div class="receipt-name-row">
      <label>Customer Name</label>
      <input id="customer-name" type="text" placeholder="e.g. Juan dela Cruz" />
    </div>

    <div class="modal-actions">
      <button class="confirm-btn" onclick="confirmOrder()">Confirm</button>
      <button class="cancel-btn" onclick="document.getElementById('order-modal').style.display='none'">Cancel</button>
    </div>

  </div>
</div>

<!-- ═════════ SUCCESS MODAL ═════════ -->
<div id="success-modal" class="modal-overlay" style="display:none">
  <div class="modal-box success-box">
    <div class="success-icon">✅</div>
    <h2>Order Placed!</h2>
    <p id="success-msg"></p>
    <button class="confirm-btn" onclick="document.getElementById('success-modal').style.display='none'">
      New Order
    </button>
  </div>
</div>

<!-- ═════════ ADMIN LOGIN ═════════ -->
<div id="admin-login-modal" class="modal-overlay" style="display:none">
  <div class="modal-box">

    <h2 class="modal-title">Admin Login</h2>

    <input id="admin-password-input" type="password" placeholder="Password" />

    <p id="login-error" style="display:none;color:red;font-size:0.9rem;">Wrong password</p>

    <div class="modal-actions">
      <button class="confirm-btn" onclick="checkAdminLogin()">Enter</button>
      <button class="cancel-btn" onclick="closeAdminLogin()">Cancel</button>
    </div>

  </div>
</div>

<!-- ═════════ FIREBASE APP ═════════ -->
<script type="module" src="app.js"></script>

</body>
</html>
