<!DOCTYPE html>
<html>
<head>
  <title>Dry Market Kiosk</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <h2>🥬 Dry Market Kiosk</h2>
  <button onclick="toggleAdmin()">Admin</button>
</div>

<!-- KIOSK -->
<div id="kiosk">
  <div id="products"></div>

  <div class="cart">
    <h3>🛒 Basket</h3>
    <div id="cartItems"></div>
    <h3>Total: ₱<span id="total">0</span></h3>

    <input id="customerName" placeholder="Name (optional)">
    <button onclick="checkout()">ORDER</button>
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="hidden">
  <h2>Admin Panel</h2>

  <h3>Update Prices</h3>
  <div id="adminProducts"></div>

  <h3>Past Orders</h3>
  <div id="orders"></div>

  <button onclick="toggleAdmin()">Back</button>
</div>

<!-- RECEIPT MODAL -->
<div id="receiptModal" class="modal hidden">
  <div class="modal-content">
    <h2>Receipt</h2>
    <div id="receipt"></div>
    <button onclick="closeReceipt()">Close</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
