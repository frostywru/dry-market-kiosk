<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>M&L Dry Market</title>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- ================= KIOSK ================= -->
<div id="kiosk-view">

  <header class="header">
    <h1>M&L Dry Market</h1>
    <button onclick="openAdminLogin()">Admin</button>
  </header>

  <div class="container">

    <!-- PRODUCTS -->
    <div class="products">
      <h2>Products</h2>
      <div id="product-grid"></div>
    </div>

    <!-- CART -->
    <div class="cart">
      <h2>Cart</h2>
      <div id="cart-items">Empty cart</div>

      <h3 id="cart-total">₱0</h3>

      <button id="order-btn" onclick="openOrderModal()" disabled>
        Place Order
      </button>

      <button onclick="clearCart()">Clear</button>
    </div>

  </div>
</div>

<!-- ================= ORDER MODAL ================= -->
<div id="order-modal" class="modal">
  <div class="modal-box">
    <h2>Confirm Order</h2>
    <button onclick="confirmOrder()">Confirm</button>
    <button onclick="closeOrderModal()">Cancel</button>
  </div>
</div>

<!-- ================= SUCCESS ================= -->
<div id="success-modal" class="modal">
  <div class="modal-box">
    <h2>Order Success</h2>
    <button onclick="closeSuccessModal()">OK</button>
  </div>
</div>

<!-- ================= ADMIN LOGIN ================= -->
<div id="admin-login-modal" class="modal">
  <div class="modal-box">
    <input id="admin-password-input" type="password" placeholder="Password">
    <button onclick="checkAdminLogin()">Login</button>
    <button onclick="closeAdminLogin()">Cancel</button>
  </div>
</div>

<!-- ================= ADMIN ================= -->
<div id="admin-view" style="display:none">

  <header class="header">
    <h1>Admin Panel</h1>
    <button onclick="exitAdmin()">Back</button>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('inventory', this)">Inventory</button>
    <button class="tab-btn" onclick="switchTab('orders', this)">Orders</button>
  </div>

  <div id="tab-inventory">
    <h2>Products</h2>
    <div id="admin-product-list"></div>
  </div>

  <div id="tab-orders" style="display:none">
    <h2>Orders</h2>
    <div id="admin-orders-list"></div>
  </div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
